# Konfigurasi build dasar untuk Netlify
[build]
  # Perintah untuk membangun proyek Vite Anda
  command = "npm run build"
  # Direktori output hasil build
  publish = "dist"

# Node.js version (harus match dengan .nvmrc)
[build.environment]
  NODE_VERSION = "22"

# Aturan redirect untuk Single-Page Application (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200