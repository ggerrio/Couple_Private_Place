name: Realtime Sync E2E

# Catch realtime regressions on every PR.
# Mirrors the manual 4-surface stress-test table as Playwright specs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  realtime-sync:
    name: Playwright (Firebase Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # Firebase emulators require Java 11+.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # 🚀 Start Firebase emulators (auth + firestore + rtdb) in background.
      # The webServer hook in playwright.config.ts will start Vite dev:test
      # (which connects to these emulators via VITE_USE_FIREBASE_EMULATOR=true).
      - name: Start Firebase emulators
        run: |
          nohup npx firebase emulators:start \
            --only auth,firestore,database \
            --project demo-couple-test \
            > emulator.log 2>&1 &
          echo $! > emulator.pid
          # Wait for emulator health endpoints
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8080 > /dev/null && break
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10
          if-no-files-found: ignore

      - name: Upload emulator log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log
          path: emulator.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Kill emulators
        if: always()
        run: |
          if [ -f emulator.pid ]; then
            kill $(cat emulator.pid) || true
          fi
